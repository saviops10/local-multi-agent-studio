project:
  name: AI Multi-Agent Studio
  version: 1.1.0
  description: A collaborative environment where multiple AI agents can interact, manage workspaces, and generate/edit files.
  tech_stack:
    frontend:
      framework: React 19
      styling: Tailwind CSS 4
      animations: Motion
      icons: Lucide React
      editor: Monaco Editor
      markdown: React Markdown
    backend:
      runtime: Node.js (Express)
      database: SQLite (Better-SQLite3)
      ai_integration: Google Gemini API (@google/genai)
      file_system: Local Data Storage (data/workspaces)

architecture:
  workspaces:
    description: Isolated environments for specific projects.
    storage: Each workspace has a dedicated folder in `data/workspaces/{id}`.
    database_table: `workspaces` (id, name, description, created_at)
  agents:
    description: Specialized AI entities with unique personalities and instructions.
    database_table: `agents` (id, name, role, system_instruction, created_at)
  messages:
    description: Persistent chat history for each workspace.
    database_table: `messages` (id, workspace_id, sender_name, content, role, created_at)
  files:
    description: Documents generated by agents or uploaded by users.
    detection: Agents use `[FILE:filename.ext] content [/FILE]` tags to generate files.
    management: Files are stored physically and indexed via real-time file system scanning.

core_logic:
  agent_interaction:
    - Agents receive the last 20 messages as context.
    - Agents are instructed to collaborate and use the workspace file system.
  file_generation:
    - Backend parses agent responses for `[FILE:...]` tags.
    - Files are saved to the workspace-specific directory.
  local_integration:
    - "Open in Folder" feature uses OS-level commands to open local directories.
    - Embedded Monaco Editor allows manual code/text adjustments.

security_notes:
  - API keys are managed via environment variables.
  - Workspace isolation is enforced via directory structure.
  - Backup strategy: All data is stored in `studio.db` and the `data/` folder.
